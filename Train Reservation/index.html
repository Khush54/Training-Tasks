<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Reservation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="left-container">
            <h2>Train Reservation</h2>
            <div class="btns">
                <button id="passengerList">1. Passenger List</button>
                <button id="seniorCitizens">2. Senior Citizens(60+)</button>
                <button id="uppercaseNames">3. Uppercase Names</button>
                <button id="totalAgeReduce">4. Total Age(Reduce)</button>
                <button id="totalAgeReduceRight">5. Total Age(Reduce Right)</button>
                <button id="checkAllAdults">6. Check All Adults</button>
                <button id="checkAnyMinor">7. Any Minor?</button>
                <button id="genderRatio">8. Gender Ratio </button>
                <button id="addExtraPassengers">9. Add Extra Passengers</button>
                <button id="separateFirstPassenger">10. Separate First</button>
            </div>
        </div>
        <div class="right-container">
            <h3>Result</h3>
            <div id="result_box"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
