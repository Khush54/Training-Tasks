<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo trading bot</title>
</head>
<body>
    <script>
        let balance = 1000;
        let stock_price = 100;
        let holdings = 0;

        function updatePrice(){
            stock_price = Math.floor(Math.random() * ((120-80)+1) + 80);
            return stock_price;
        }

        function decideAction(stock_price){
            if(stock_price < 90 && balance >= stock_price){
                return "BUY";
            }
            else if(stock_price > 110 && holdings > 0){
                return "SELL";
            }
            else{
                return "HOLD";
            }
        }

        function trade(action){
            if(action == "BUY"){
                balance -= stock_price;
                holdings ++ ;
            }
            else if(action == "SELL"){
                balance += stock_price;
                holdings --;
            }
            else {
                console.log('HOLD');
            }
        }

        for(let i = 1; i <= 10 ; i++){
           let price =  updatePrice();
           let decision = decideAction(price);
           trade(decision);

           document.write('Round ' + i + ': ')
           document.write("Stock Price = " + price + ", ");
           document.write("Action = " + decision + ", ")
           document.write("Balance = " + balance + ",  ");
           document.write("Holdings = " + holdings + "<br>");
        }


    </script>
</body>
</html>
